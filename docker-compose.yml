services:
  provider-diff:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GO_BASE_IMAGE: ${GO_BASE_IMAGE:-golang:1.22-alpine}
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-alpine}
    ports:
      - "${APP_PORT:-4173}:4173"
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      APP_PORT: 4173
      PORT: 8080
    volumes:
      - ./outputs:/app/outputs
    depends_on:
      - evalscope
      - opencompass

  evalscope:
    build:
      context: .
      dockerfile: Dockerfile.evalscope
      args:
        EVALSCOPE_BASE_IMAGE: ${EVALSCOPE_BASE_IMAGE:-python:3.11-slim}
    ports:
      - "${EVALSCOPE_PORT:-9000}:9000"
    volumes:
      - ./outputs:/app/outputs

  opencompass:
    build:
      context: .
      dockerfile: Dockerfile.opencompass
      args:
        OPENCOMPASS_BASE_IMAGE: ${OPENCOMPASS_BASE_IMAGE:-python:3.10-slim}
    ports:
      - "${OPENCOMPASS_PORT:-9100}:9100"
    volumes:
      - ./outputs/opencompass:/app/outputs
